name: Copy Windows DLL dependencies
description: >
  Recursively resolves and copies all DLLs required to run a given Windows
  executable into the same directory as the executable. Dependencies are
  discovered via `llvm-readobj --coff-imports`. DLLs that are products of
  the build itself (i.e. already sitting next to the executable) are kept;
  other dependencies are copied only when they are on a built-in allow-list
  of Swift / Foundation / libdispatch / MSVC runtime DLLs. The remaining
  (Windows system) DLLs are ignored. An allow-listed DLL that cannot be
  located on `PATH` is treated as an error.

  Logic adapted from
  https://github.com/moreSwift/swift-bundler `GenericWindowsBundler.swift`.

inputs:
  executable:
    description: Absolute path to the Windows .exe whose DLL dependencies should be bundled.
    required: true

runs:
  using: composite
  steps:
    - name: Ensure llvm-readobj is available
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        if (-not (Get-Command llvm-readobj -ErrorAction SilentlyContinue)) {
          Write-Error "llvm-readobj was not found on PATH. It ships with the Swift toolchain on Windows; ensure the toolchain's bin directory is on PATH."
          exit 1
        }

    - name: Copy DLL dependencies
      shell: pwsh
      env:
        INPUT_EXECUTABLE: ${{ inputs.executable }}
      run: ${{ github.action_path }}/scripts/Bundle-Dlls.ps1 -Executable $env:INPUT_EXECUTABLE
